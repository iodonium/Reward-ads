<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reward Ads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(160deg,#050010,#1a0036);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* Header */

.header{
text-align:center;
margin-bottom:15px;
}

.logo{
font-size:22px;
font-weight:600;
}

.status{
font-size:12px;
color:#00ffc8;
}

/* Card */

.card{
background:#13002a;
padding:18px;
border-radius:18px;
margin-top:15px;
box-shadow:0 0 25px rgba(128,0,255,.25);
}

/* Topbar */

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.small{
font-size:12px;
opacity:.7;
}

/* Button */

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#7b00ff,#d100ff);
color:white;
font-weight:600;
cursor:pointer;
}

/* Banner */

.banner{
margin-top:14px;
border-radius:14px;
overflow:hidden;
background:#220044;
cursor:pointer;
transition:.2s;
}

.banner:hover{
transform:scale(1.02);
}

.banner img{
width:100%;
aspect-ratio:16/9;
object-fit:cover;
}

.banner-text{
padding:10px;
font-size:14px;
}

/* Error */

.error{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff0055;
padding:12px 20px;
border-radius:10px;
display:none;
}

/* Loading */

.loading{
position:fixed;
top:0;
bottom:0;
left:0;
right:0;
background:#050010;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
z-index:100;
}

</style>

</head>

<body>

<div class="loading" id="loading">
Loading...
</div>

<div class="container">

<div class="header">
<div class="logo">Reward Ads</div>
<div class="status">Secure Connection</div>
</div>

<div id="login" class="card">

<button onclick="login()">
Continue With Google
</button>

</div>

<div id="dashboard" style="display:none">

<div class="card">

<div class="topbar">

<div>
<div class="small">Email</div>
<div id="email"></div>
</div>

<div>
<div class="small">Points</div>
<div id="points">0</div>
</div>

</div>

</div>

<div class="card">

<div class="banner" onclick="clickAd('ad1','https://example.com')">
<img src="/image1.png">
<div class="banner-text">Gaming Offer</div>
</div>

<div class="banner" onclick="clickAd('ad2','https://example.com')">
<img src="/image2.png">
<div class="banner-text">Watch Videos</div>
</div>

<div class="banner" onclick="clickAd('ad3','https://example.com')">
<img src="/image3.png">
<div class="banner-text">Earn Rewards</div>
</div>

</div>

</div>

</div>

<div class="error" id="error"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBtni6L2njhzJ0yNIP_D66-TOpOkZDCC-8",

authDomain: "rewardads-668b6.firebaseapp.com",

projectId: "rewardads-668b6",

storageBucket: "rewardads-668b6.firebasestorage.app",

messagingSenderId: "868867716513",

appId: "1:868867716513:web:f14225721d0e778ae007e0"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

let user;

let points=0;

let clicks={};

/* Auto Login */

onAuthStateChanged(auth, async (u)=>{

if(u){

user=u;

await loadUser();

}

document.getElementById("loading").style.display="none"

})

window.login=async()=>{

try{

const provider=new GoogleAuthProvider();

const result=await signInWithPopup(auth,provider);

user=result.user;

await loadUser();

}catch(e){

showError(e.message)

}

}

async function loadUser(){

document.getElementById("login").style.display="none"

document.getElementById("dashboard").style.display="block"

document.getElementById("email").innerText=user.email

const ref=doc(db,"users",user.uid)

const snap=await getDoc(ref)

if(snap.exists()){

points=snap.data().points || 0

clicks=snap.data().clicks || {}

}else{

await setDoc(ref,{

email:user.email,

points:0,

clicks:{},

day:new Date().toDateString()

})

}

updateUI()

}

window.clickAd=async(id,url)=>{

if(points>=100){

showError("Daily limit reached")

return

}

if(!clicks[id]) clicks[id]=0

if(clicks[id]>=5){

showError("Max reached")

return

}

clicks[id]++

points++

const ref=doc(db,"users",user.uid)

await setDoc(ref,{

email:user.email,

points:points,

clicks:clicks,

day:new Date().toDateString()

})

updateUI()

window.open(url)

}

function updateUI(){

document.getElementById("points").innerText=points

}

function showError(msg){

let e=document.getElementById("error")

e.innerText=msg

e.style.display="block"

setTimeout(()=>{

e.style.display="none"

},3000)

}

</script>

</body>

</html>
