<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reward Ads</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:linear-gradient(145deg,#060012,#210042);
color:white;
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.logo{
text-align:center;
font-size:22px;
font-weight:600;
}

.connected{
font-size:12px;
color:#00ffc3;
}

.card{
background:#170030;
padding:18px;
border-radius:18px;
margin-top:15px;
box-shadow:0 0 20px rgba(120,0,255,0.25);
}

input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:#2a0052;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:14px;
background:linear-gradient(90deg,#7b00ff,#d100ff);
color:white;
font-weight:600;
cursor:pointer;
}

.topbar{
display:flex;
justify-content:space-between;
background:#140028;
padding:14px;
border-radius:14px;
margin-bottom:15px;
}

.banner{
background:#220044;
border-radius:18px;
overflow:hidden;
margin-top:14px;
cursor:pointer;
transition:.3s;
}

.banner:hover{
transform:scale(1.02);
}

.banner img{
width:100%;
height:130px;
object-fit:cover;
}

.banner-text{
padding:10px;
}

.checkbox{
margin-top:12px;
display:flex;
align-items:center;
gap:8px;
}

.terms-link{
color:#9d6cff;
cursor:pointer;
font-size:13px;
}

/* Terms Popup */

.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#16002e;
padding:20px;
border-radius:20px;
width:90%;
max-width:400px;
}

.popup button{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Reward Ads
<div class="connected" id="status">Connecting...</div>
</div>

<div id="login" class="card">

<input id="email" placeholder="Enter Email">

<div class="checkbox">
<input type="checkbox" id="terms">
<div class="terms-link" onclick="showTerms()">Terms & Conditions</div>
</div>

<button onclick="login()">Enter</button>

</div>


<div id="dashboard" style="display:none">

<div class="topbar">
<div>
Email
<div id="userEmail"></div>
</div>

<div>
Points
<div id="points">0</div>
</div>
</div>


<div class="card">

<div class="banner" onclick="clickAd('ad1','https://example.com')">
<img src="/image1.png">
<div class="banner-text">Gaming Website</div>
</div>

<div class="banner" onclick="clickAd('ad2','https://example.com')">
<img src="/image2.png">
<div class="banner-text">Watch Videos</div>
</div>

<div class="banner" onclick="clickAd('ad3','https://example.com')">
<img src="/image3.png">
<div class="banner-text">Earn Rewards</div>
</div>

</div>

</div>

</div>


<!-- Terms Popup -->

<div class="popup" id="termsPopup">
<div class="popup-box">

<h3>Terms & Conditions</h3>

<p style="font-size:13px;margin-top:10px">

• Max 100 points daily<br>
• Max 5 clicks per banner<br>
• No bot usage<br>
• Abuse leads to ban<br>

</p>

<button onclick="closeTerms()">Back</button>

</div>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBtni6L2njhzJ0yNIP_D66-TOpOkZDCC-8",
authDomain: "rewardads-668b6.firebaseapp.com",
projectId: "rewardads-668b6",
storageBucket: "rewardads-668b6.firebasestorage.app",
messagingSenderId: "868867716513",
appId: "1:868867716513:web:f14225721d0e778ae007e0",
measurementId: "G-PH6D0FPWYY"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user;
let points=0;
let clicks={};

signInAnonymously(auth).then(()=>{
document.getElementById("status").innerText="Connected ✓"
}).catch(()=>{
document.getElementById("status").innerText="Connection Failed"
});

window.login = async function(){

const email=document.getElementById("email").value
const terms=document.getElementById("terms").checked

if(!email) return alert("Enter Email")
if(!terms) return alert("Accept Terms")

user=auth.currentUser

const ref=doc(db,"users",user.uid)
const snap=await getDoc(ref)

if(snap.exists()){
points=snap.data().points || 0
clicks=snap.data().clicks || {}
}else{
await setDoc(ref,{
email:email,
points:0,
clicks:{},
day:new Date().toDateString()
})
}

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"
document.getElementById("userEmail").innerText=email

updateUI()

}

window.clickAd = async function(id,url){

const today=new Date().toDateString()

const ref=doc(db,"users",user.uid)
const snap=await getDoc(ref)

let data=snap.data()

if(data.day!==today){
points=0
clicks={}
}

if(points>=100){
alert("Daily limit reached")
return
}

if(!clicks[id]) clicks[id]=0

if(clicks[id]>=5){
alert("Max reached")
return
}

clicks[id]++
points++

await setDoc(ref,{
email:data.email,
points:points,
clicks:clicks,
day:today
})

updateUI()
window.open(url)

}

function updateUI(){
document.getElementById("points").innerText=points
}

window.showTerms=function(){
document.getElementById("termsPopup").style.display="flex"
}

window.closeTerms=function(){
document.getElementById("termsPopup").style.display="none"
}

</script>

</body>
</html>
